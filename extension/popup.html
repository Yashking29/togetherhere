<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Together</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0a0916;
      --surface: rgba(255,255,255,0.06);
      --border:  rgba(255,255,255,0.09);
      --text:    #f0eeff;
      --muted:   #7a7898;
      --accent:  #f472b6;
      --adim:    rgba(244,114,182,0.18);
    }
    body {
      width: 270px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .logo { font-size: 1.1rem; color: var(--accent); filter: drop-shadow(0 0 8px rgba(244,114,182,.5)); }
    .title { font-weight: 600; font-size: 13px; color: var(--text); }
    .subtitle { font-size: 11px; color: var(--muted); }

    /* Site warning */
    .warn {
      margin: 12px;
      padding: 9px 12px;
      background: rgba(251,191,36,.08);
      border: 1px solid rgba(251,191,36,.25);
      border-radius: 8px;
      font-size: 11px;
      color: #fbbf24;
      line-height: 1.5;
    }

    /* Form */
    .form { padding: 14px 14px 16px; display: flex; flex-direction: column; gap: 10px; }
    input {
      width: 100%;
      padding: 9px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      outline: none;
    }
    input:focus { border-color: rgba(244,114,182,.5); }
    input::placeholder { color: var(--muted); opacity: .6; }

    .radio-row { display: flex; gap: 8px; }
    .radio-btn {
      flex: 1;
      padding: 7px 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      transition: all .15s;
    }
    .radio-btn.active {
      background: var(--adim);
      border-color: rgba(244,114,182,.4);
      color: var(--accent);
    }

    .btn {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg,#e059a0,#a855d4);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .88; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    /* Room view */
    .room-view { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
    .status-row { display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .dot.online { background: var(--accent); box-shadow: 0 0 6px rgba(244,114,182,.6); }
    .status-text { font-size: 12px; color: var(--text); }
    .room-id { font-size: 11px; color: var(--muted); word-break: break-all; }
    .btn-ghost {
      width: 100%;
      padding: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-ghost:hover { background: rgba(255,255,255,.09); }
    .btn-leave {
      background: rgba(248,113,113,.08);
      border-color: rgba(248,113,113,.2);
      color: #f87171;
    }
    .btn-leave:hover { background: rgba(248,113,113,.15); }

    .divider { height: 1px; background: var(--border); }
    #join-row { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">&#9671;</span>
    <div>
      <div class="title">Together Party</div>
      <div class="subtitle">Sync with your partner</div>
    </div>
  </div>

  <!-- Not on a supported site -->
  <div class="warn" id="warn-site" style="display:none">
    Open Netflix, Prime Video, Disney+, Hotstar or Hulu first, then start a party.
  </div>

  <!-- Setup form -->
  <div class="form" id="setup-view">
    <input id="name-input" type="text" placeholder="Your name (e.g. Alex)" maxlength="20" autocomplete="off" />
    <div class="radio-row">
      <button class="radio-btn active" id="btn-create-mode">Create Room</button>
      <button class="radio-btn"        id="btn-join-mode">Join Room</button>
    </div>
    <div id="join-row">
      <input id="room-input" type="text" placeholder="Room ID or link" autocomplete="off" />
    </div>
    <button class="btn" id="start-btn">Start Party ♡</button>
  </div>

  <!-- Active room -->
  <div class="room-view" id="room-view" style="display:none">
    <div class="status-row">
      <div class="dot" id="partner-dot"></div>
      <div class="status-text" id="partner-status">Waiting for partner…</div>
    </div>
    <div class="room-id" id="room-id-text"></div>
    <div class="divider"></div>
    <button class="btn-ghost" id="copy-btn">&#128279; Copy Invite Link</button>
    <button class="btn-ghost btn-leave" id="leave-btn">Leave Room</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
